services:
  opencode:
    container_name: opencode_agent
    build: .
    tty: true
    stdin_open: true
    volumes:
      - ${PATH_FOLDER_WORKSPACE:-./workspace}:/workspace
      - ${OPENCODE_LOCAL:-./config}:/root/.config/opencode
      - ${OPENCODE_CONFIG:-./local}:/root/.local/share/opencode

    working_dir: /workspace
    env_file:
      - .env
    environment:
      - MODEL=google/gemini-3.5-flash
      - GEMINI_MODEL=google/gemini-3.5-flash
      
      - HTTP_PROXY=${USE_PROXY:+${PROXY_SERVER}}
      - HTTPS_PROXY=${USE_PROXY:+${PROXY_SERVER}}
      - http_proxy=${USE_PROXY:+${PROXY_SERVER}}
      - https_proxy=${USE_PROXY:+${PROXY_SERVER}}
      
      - NO_PROXY=host.docker.internal,127.0.0.1,localhost
      - no_proxy=host.docker.internal,127.0.0.1,localhost

    extra_hosts:
      - "host.docker.internal:host-gateway"